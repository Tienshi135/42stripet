secrets:
  db_password:
    file: ../secrets/.db_password
  db_root_password:
    file: ../secrets/.db_root_password




services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_volume:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
      - website
    restart: always

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - wordpress_volume:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    restart: always
    expose:
      - "9000"



  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb_volume:/var/lib/mysql
    networks:
      - inception
    restart: always
    expose:
      - "3306"
    

    
  website:
    build: ./requirements/bonus/website
    container_name: website
    networks:
      - inception
    restart: always




volumes:
  wordpress_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/stripet/data/wordpress


  mariadb_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/stripet/data/mariadb




networks:
  inception:
    driver: bridge
